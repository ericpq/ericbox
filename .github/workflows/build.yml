name: Build EricBox APK

on:
  push:
    branches: [ dev, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sing-box source
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: testing
          fetch-depth: 0
          submodules: 'recursive'

      - name: Checkout custom UI overlay
        uses: actions/checkout@v4
        with:
          path: custom-ui

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '~1.25'

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build libbox.aar
        run: |
          make lib_install
          export PATH="$PATH:$(go env GOPATH)/bin"
          make lib_android
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Overlay custom UI onto SFA
        run: |
          # Checkout the dev branch of clients/android submodule
          cd clients/android
          git checkout dev
          cd ../..

          SRC=custom-ui
          DST=clients/android

          # DashboardScreen.kt - Surfboard-style redesign
          cp $SRC/app/src/main/java/io/nekohasekai/sfa/compose/screen/dashboard/DashboardScreen.kt \
             $DST/app/src/main/java/io/nekohasekai/sfa/compose/screen/dashboard/DashboardScreen.kt

          # Theme - Surfboard teal/cyan colors
          cp $SRC/app/src/main/java/io/nekohasekai/sfa/compose/theme/Color.kt \
             $DST/app/src/main/java/io/nekohasekai/sfa/compose/theme/Color.kt
          cp $SRC/app/src/main/java/io/nekohasekai/sfa/compose/theme/Theme.kt \
             $DST/app/src/main/java/io/nekohasekai/sfa/compose/theme/Theme.kt

          # SettingsScreen - EricBox branding
          cp $SRC/app/src/main/java/io/nekohasekai/sfa/compose/screen/settings/SettingsScreen.kt \
             $DST/app/src/main/java/io/nekohasekai/sfa/compose/screen/settings/SettingsScreen.kt

          # Strings - App name
          cp $SRC/app/src/main/res/values/strings.xml \
             $DST/app/src/main/res/values/strings.xml
          for locale in fa ru-rRU zh-rCN zh-rTW; do
            cp $SRC/app/src/main/res/values-$locale/strings.xml \
               $DST/app/src/main/res/values-$locale/strings.xml
          done

          # Build config and keystore
          cp $SRC/app/build.gradle.kts $DST/app/build.gradle.kts
          cp $SRC/app/ericbox.keystore $DST/app/ericbox.keystore

      - name: Build APK
        run: |
          mkdir -p clients/android/app/libs
          cp *.aar clients/android/app/libs
          cd clients/android
          ./gradlew :app:assembleOtherRelease
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          LOCAL_PROPERTIES: ${{ secrets.LOCAL_PROPERTIES }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EricBox-APK
          path: clients/android/app/build/outputs/apk/other/release/*.apk
